<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Claude Code Skills Reference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --accent: #3b82f6;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --border: #334155;
      --green: #22c55e;
      --purple: #a855f7;
      --orange: #f97316;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --yellow: #eab308;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--surface);
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .header .subtitle { font-size: 14px; color: var(--text-dim); }

    .nav-links {
      display: flex; justify-content: center; gap: 12px; padding: 16px 20px;
      flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .nav-link {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: 8px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500;
      transition: all 0.2s ease;
    }
    .nav-link:hover { border-color: var(--accent); background: #1e3a5f; }
    .nav-link.active { border-color: var(--accent); background: rgba(59,130,246,0.15); }

    .controls {
      display: flex; align-items: center; gap: 12px; padding: 16px 24px;
      flex-wrap: wrap; max-width: 1400px; margin: 0 auto; width: 100%;
    }
    .search-box {
      flex: 1; min-width: 200px; padding: 9px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-dim); }
    .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-dim); font-size: 12px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { border-color: var(--accent); background: rgba(59,130,246,0.15); color: var(--accent); font-weight: 600; }

    .stats-bar {
      display: flex; gap: 20px; padding: 0 24px 16px;
      max-width: 1400px; margin: 0 auto; width: 100%;
      font-size: 13px; color: var(--text-dim);
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .main { flex: 1; padding: 0 24px 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

    .category-section { margin-bottom: 32px; }
    .category-header {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: var(--text);
      padding: 10px 0 12px; border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .category-badge {
      padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: var(--surface2); color: var(--text-dim);
    }

    .skills-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
    .skills-table th {
      text-align: left; font-size: 11px; font-weight: 600; color: var(--text-dim);
      padding: 6px 14px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .skill-row {
      background: var(--surface); border-radius: 8px;
      transition: all 0.2s; cursor: default;
    }
    .skill-row:hover { background: var(--surface2); }
    .skill-row td { padding: 12px 14px; vertical-align: middle; }
    .skill-row td:first-child { border-radius: 8px 0 0 8px; }
    .skill-row td:last-child { border-radius: 0 8px 8px 0; }

    .skill-name {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px; font-weight: 600; color: var(--accent);
      white-space: nowrap;
    }
    .skill-source {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
      white-space: nowrap;
    }
    .source-gstack { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .source-mattpocock { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .source-superpowers { background: rgba(249,115,22,0.12); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
    .source-builtin { background: rgba(6,182,212,0.12); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
    .source-nimrodfisher { background: rgba(234,179,8,0.12); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }

    .skill-desc { font-size: 13px; color: var(--text-dim); line-height: 1.4; }
    .skill-trigger {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px; color: var(--text-dim);
      background: var(--bg); padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--border); white-space: nowrap;
    }
    .auto-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; background: rgba(234,179,8,0.12);
      color: #facc15; border: 1px solid rgba(234,179,8,0.3);
    }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-dim);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    .footer { text-align: center; padding: 20px; font-size: 13px; color: var(--text-dim); border-top: 1px solid var(--border); }
    .footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .header h1 { font-size: 20px; }
      .controls { padding: 12px 16px; }
      .main { padding: 0 16px 24px; }
      .skills-table th:nth-child(3),
      .skill-row td:nth-child(3) { display: none; }
    }
    @media (max-width: 500px) {
      .skills-table th:nth-child(4),
      .skill-row td:nth-child(4) { display: none; }
    }
  </style>
</head>

<nav class="nav-links">

<div class="stats-bar">

</div>

<div class="main" id="mainContent"></div>

<div class="footer">

  { cat: 'builtin', name: 'keybindings-help', source: 'builtin', desc: '키보드 단축키 커스터마이징. ~/.claude/keybindings.json 수정', trigger: '"단축키 바꿔줘"' },
  { cat: 'builtin', name: 'init', source: 'builtin', desc: 'CLAUDE.md 초기화. 코드베이스 문서 자동 생성', trigger: '/init' },
  { cat: 'builtin', name: 'review', source: 'builtin', desc: 'PR 리뷰 (빌트인 버전)', trigger: '/review' },
  { cat: 'builtin', name: 'security-review', source: 'builtin', desc: '현재 브랜치 보안 리뷰', trigger: '/security-review' },
  { cat: 'builtin', name: 'simplify', source: 'builtin', desc: '변경된 코드 재사용성·품질·효율성 검토 후 수정', trigger: '/simplify' },
  { cat: 'builtin', name: 'fewer-permission-prompts', source: 'builtin', desc: '트랜스크립트 스캔 → 자주 쓰는 명령 allowlist 자동 추가', trigger: '/fewer-permission-prompts' },
  { cat: 'builtin', name: 'loop', source: 'builtin', desc: '명령을 반복 주기로 실행. 폴링·상태 감시에 활용', trigger: '/loop 5m /command' },
  { cat: 'builtin', name: 'schedule', source: 'builtin', desc: 'cron 스케줄 원격 에이전트 생성·관리. 예약 실행 설정', trigger: '/schedule' },
  { cat: 'builtin', name: 'claude-api', source: 'builtin', desc: 'Claude API·Anthropic SDK 개발·디버깅·모델 마이그레이션. 프롬프트 캐싱 포함', trigger: 'anthropic import 감지 시 자동' },
];

const CAT_LABELS = {
  workflow: '개발 워크플로우',
  planning: '계획·리뷰 파이프라인',
  quality: '코드 품질·보안',
  qa: 'QA·테스트',
  browser: '브라우저·UI',
  deploy: '배포·릴리즈',
  utility: '유틸·설정',
  superpowers: 'Superpowers',
  builtin: 'Built-in',
  data: '데이터 분석 (Data Analytics)',
};

const CAT_ICONS = {
  workflow: '⚙️', planning: '🧭', quality: '🛡️', qa: '🔍',
  browser: '🌐', deploy: '🚀', utility: '🔧', superpowers: '🦸', builtin: '📦',
  data: '📊',
};

const SOURCE_LABELS = {
  gstack: 'gstack', mattpocock: 'Matt Pocock',
  superpowers: 'Superpowers', builtin: 'Built-in',
  nimrodfisher: 'Data Analytics',
};

let currentFilter = 'all';
let searchQuery = '';

function render() {
  const query = searchQuery.toLowerCase();
  const filtered = SKILLS.filter(s => {
    const matchCat = currentFilter === 'all' || s.cat === currentFilter;
    const matchSearch = !query ||
      s.name.toLowerCase().includes(query) ||
      s.desc.toLowerCase().includes(query) ||
      s.trigger.toLowerCase().includes(query) ||
      SOURCE_LABELS[s.source].toLowerCase().includes(query);
    return matchCat && matchSearch;
  });

  document.getElementById('visibleCount').textContent = `${filtered.length}개 표시 중`;

  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.cat]) grouped[s.cat] = [];
    grouped[s.cat].push(s);
  });

  const catOrder = ['workflow','planning','quality','qa','browser','deploy','utility','superpowers','builtin','data'];
  const main = document.getElementById('mainContent');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>"${searchQuery}" 검색 결과 없음</div></div>`;
    return;
  }

  main.innerHTML = catOrder
    .filter(c => grouped[c])
    .map(c => {
      const skills = grouped[c];
      const rows = skills.map(s => `
        <tr class="skill-row">
          <td><span class="skill-name">${s.name}</span></td>
          <td><span class="skill-source source-${s.source}">${SOURCE_LABELS[s.source]}</span></td>
          <td><span class="skill-desc">${s.desc}</span></td>
          <td>${s.trigger === '자동 발동' || s.trigger.includes('자동') ?
            `<span class="auto-badge">자동</span>` :
            `<span class="skill-trigger">${s.trigger}</span>`
          }</td>
        </tr>
      `).join('');
      return `
        <div class="category-section">
          <div class="category-header">
            <span>${CAT_ICONS[c]}</span>
            <span>${CAT_LABELS[c]}</span>
            <span class="category-badge">${skills.length}개</span>
          </div>
          <table class="skills-table">
            <thead>
              <tr>
                <th style="width:180px">스킬</th>
                <th style="width:110px">출처</th>
                <th>기능</th>
                <th style="width:200px">트리거</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('filterBtns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

render();
</script>
</body>
</html>
