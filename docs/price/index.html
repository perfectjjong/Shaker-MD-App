<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Dashboard Hub - Price Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #232342;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #8888aa;
      --border: #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .auth-bar .auth-user { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
    .auth-bar .auth-dot { width: 8px; height: 8px; border-radius: 50%; background: #00d26a; flex-shrink: 0; }
    .auth-bar .auth-email { color: var(--text); font-weight: 500; }
    .auth-bar .auth-logout {
      padding: 4px 12px; border-radius: 6px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text-dim); text-decoration: none;
      font-size: 12px; cursor: pointer; transition: all 0.2s ease;
    }
    .auth-bar .auth-logout:hover { border-color: var(--accent); color: var(--accent); }
    .auth-bar.auth-hidden { display: none; }

    .header {
      background: var(--surface);
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .header .subtitle { font-size: 14px; color: var(--text-dim); }

    .nav-links {
      display: flex; justify-content: center; gap: 12px; padding: 16px 20px;
      flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .nav-link {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: 8px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500;
      transition: all 0.2s ease;
    }
    .nav-link:hover { border-color: var(--accent); background: #2a2a50; }
    .nav-link.active { border-color: var(--accent); background: rgba(233, 69, 96, 0.15); }
    .nav-link-icon { font-size: 16px; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; transition: all 0.3s ease; height: 100%; cursor: pointer; user-select: none;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15); }
    .card-icon { font-size: 40px; margin-bottom: 14px; }
    .card-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .accordion-arrow { font-size: 12px; transition: transform 0.3s ease; color: var(--text-dim); }
    .accordion-card.open .accordion-arrow { transform: rotate(180deg); }
    .accordion-card.open .card { border-color: var(--accent); box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15); }
    .accordion-card.open .card:hover { transform: none; }
    .sub-list { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.35s ease; padding: 0; }
    .accordion-card.open .sub-list { max-height: 800px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 0 0; }
    .sub-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-top: 4px;
      border-radius: 8px; background: var(--surface2); border: 1px solid var(--border);
      text-decoration: none; color: var(--text); transition: all 0.2s ease; font-size: 14px;
    }
    .sub-item:hover { border-color: var(--accent); background: #2a2a50; }
    .sub-item-icon { font-size: 20px; flex-shrink: 0; }
    .sub-item-info { flex: 1; min-width: 0; }
    .sub-item-name { font-weight: 500; font-size: 13px; }
    .sub-item-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .sub-item-arrow { color: var(--text-dim); font-size: 12px; flex-shrink: 0; }

    @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .accordion-card { animation: slideIn 0.3s ease both; text-decoration: none; color: inherit; display: block; }

    .footer { text-align: center; padding: 20px; font-size: 13px; color: var(--text-dim); border-top: 1px solid var(--border); }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .header h1 { font-size: 20px; }
      .grid { padding: 16px; gap: 14px; }
      .card { padding: 18px; }
      .nav-links { gap: 8px; padding: 12px 16px; }
      .nav-link { padding: 6px 12px; font-size: 12px; }
      .accordion-card.open .sub-list { max-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="auth-bar auth-hidden" id="authBar">
    <div class="auth-user">
      <span class="auth-dot"></span>
      <span class="auth-email" id="authEmail"></span>
    </div>
    <a class="auth-logout" id="authLogout" href="/cdn-cgi/access/logout">Logout</a>
  </div>

  <div class="header">
    <h1>Dashboard Hub</h1>
    <div class="subtitle">Price Tracking</div>
  </div>

  <nav class="nav-links">
    <a class="nav-link" href="/"><span class="nav-link-icon">🏠</span> Home</a>
    <a class="nav-link" href="/#management"><span class="nav-link-icon">📋</span> Management</a>
    <a class="nav-link" href="/#sellthru"><span class="nav-link-icon">📊</span> Sell Thru</a>
    <a class="nav-link" href="/sellout/"><span class="nav-link-icon">📦</span> Sell out</a>
    <a class="nav-link active" href="/price/"><span class="nav-link-icon">💰</span> Price Tracking</a>
  </nav>

  <div class="grid" id="dashboardGrid"></div>

  <div class="footer">
    <a href="https://github.com/perfectjjong" target="_blank" rel="noopener">github.com/perfectjjong</a>
  </div>

  <script>
    const PRICE_GROUP = {
      name: 'Price Tracking',
      description: 'Price tracking (10)',
      icon: '💰',
      children: [
        { name: 'eXtra Price Tracking', description: 'eXtra AC price tracker', url: '/dashboards/extra-price/', icon: '🛒' },
        { name: 'Al Manea Price Tracking', description: 'Al Manea AC price tracker', url: '/dashboards/almanea-price/', icon: '🏪' },
        { name: 'Black Box Price Tracking', description: 'Black Box AC price tracker', url: '/dashboards/blackbox-price/', icon: '🏷️' },
        { name: 'Al Khunizan Price Tracking', description: 'Al Khunizan AC price tracker', url: '/dashboards/alkhunaizan-price/', icon: '🏬' },
        { name: 'Bin Hamoud Price Tracking', description: 'Bin Hamoud price tracker', url: '/dashboards/bh-price/', icon: '💲' },
        { name: 'Bin Momen Price Tracking', description: 'Bin Momen AC price tracker', url: '/dashboards/binmomen-price/', icon: '🏠' },
        { name: 'SWS Price Tracking', description: 'SWS AC price tracker', url: '/dashboards/sws-price/', icon: '🔧' },
        { name: 'Najm Store Price Tracking', description: 'Najm Store AC price tracker', url: '/dashboards/najm-price/', icon: '⭐' },
        { name: 'TechnoBest Price Tracking', description: 'TechnoBest AC price tracker', url: '/dashboards/technobest-price/', icon: '💻' },
        { name: 'Tamkeen Price Tracking', description: 'Tamkeen AC price tracker', url: '/dashboards/tamkeen-price/', icon: '🏗️' },
      ],
    };

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function render() {
      const grid = document.getElementById('dashboardGrid');
      const g = PRICE_GROUP;
      const subItems = g.children.map(c => `
        <a class="sub-item" href="${esc(c.url)}">
          <span class="sub-item-icon">${c.icon}</span>
          <div class="sub-item-info">
            <div class="sub-item-name">${esc(c.name)}</div>
            <div class="sub-item-desc">${esc(c.description)}</div>
          </div>
          <span class="sub-item-arrow">&rarr;</span>
        </a>
      `).join('');

      grid.innerHTML = `
        <div class="accordion-card open" onclick="this.classList.toggle('open')">
          <div class="card">
            <div class="card-icon">${g.icon}</div>
            <div class="card-name">${esc(g.name)} <span class="accordion-arrow">&#9660;</span></div>
            <div class="card-desc">${esc(g.description)}</div>
            <div class="sub-list">${subItems}</div>
          </div>
        </div>
      `;

      grid.querySelectorAll('.sub-item').forEach(el => el.addEventListener('click', e => e.stopPropagation()));
      grid.querySelectorAll('.sub-list').forEach(el => {
        el.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
        el.addEventListener('click', e => e.stopPropagation());
      });
    }

    render();

    (function initAuth() {
      const authBar = document.getElementById('authBar');
      const authEmail = document.getElementById('authEmail');
      try {
        const cookie = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('CF_Authorization='));
        if (!cookie) return;
        const payload = JSON.parse(atob(cookie.split('=')[1].split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) return;
        if (payload.email) {
          authEmail.textContent = payload.email;
          authBar.classList.remove('auth-hidden');
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
