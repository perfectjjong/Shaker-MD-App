<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Dashboard Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #232342;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #8888aa;
      --border: #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header .subtitle {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* Card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
    }

    .card-icon {
      font-size: 40px;
      margin-bottom: 14px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .card-badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    /* Accordion card */
    .accordion-card {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .accordion-card .card {
      cursor: pointer;
      user-select: none;
    }

    .accordion-card .card-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .accordion-arrow {
      font-size: 12px;
      transition: transform 0.3s ease;
      color: var(--text-dim);
    }

    .accordion-card.open .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-card.open .card {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
    }

    .accordion-card.open .card:hover {
      transform: none;
    }

    .sub-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 0;
    }

    .accordion-card.open .sub-list {
      max-height: 400px;
      padding: 12px 0 0;
    }

    .sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-top: 4px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .sub-item:hover {
      border-color: var(--accent);
      background: #2a2a50;
    }

    .sub-item-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .sub-item-info {
      flex: 1;
      min-width: 0;
    }

    .sub-item-name {
      font-weight: 500;
      font-size: 13px;
    }

    .sub-item-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .sub-item-arrow {
      color: var(--text-dim);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Entry animation */
    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .card-link, .accordion-card {
      animation: slideIn 0.3s ease both;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 20px; }
      .grid { padding: 16px; gap: 14px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dashboard Hub</h1>
    <div class="subtitle">All dashboards in one place</div>
  </div>

  <div class="grid" id="dashboardGrid"></div>

  <div class="footer">
    <a href="https://github.com/perfectjjong" target="_blank" rel="noopener">github.com/perfectjjong</a>
  </div>

  <script>
    // ============================================
    // Dashboard Config - Edit only this section!
    // ============================================

    // Management Dashboard group (accordion card)
    const MGMT_GROUP = {
      name: 'Management Dashboard',
      description: 'Management dashboards (3)',
      icon: '📋',
      children: [
        {
          name: 'Sell Thru Progress Dashboard',
          description: 'Sell thru progress dashboard',
          url: 'https://perfectjjong.github.io/Sell-Thru-Progress-Dashboard/',
          icon: '📊',
        },
        {
          name: 'eXtra Management Dashboard',
          description: 'eXtra management dashboard',
          url: 'https://perfectjjong.github.io/extra-dashboard/executive/',
          icon: '🛒',
        },
        {
          name: 'AR Detail Dashboard',
          description: 'AR detail dashboard',
          url: 'https://junecarloosorio-3789.github.io/AR/',
          icon: '📄',
        },
      ],
    };

    // Sell out Dashboard group (accordion card)
    const SELLOUT_GROUP = {
      name: 'Sell out Dashboard',
      description: 'Sell out dashboards (3)',
      icon: '📦',
      children: [
        {
          name: 'eXtra Weekly Sell out Dashboard',
          description: 'eXtra weekly sell out dashboard',
          url: 'https://perfectjjong.github.io/extra-sellout-dashboard/',
          icon: '🛒',
        },
        {
          name: 'eXtra AC Business Sell out Dashboard',
          description: 'eXtra AC business sell out dashboard',
          url: 'https://perfectjjong.github.io/extra-dashboard/',
          icon: '📈',
        },
        {
          name: 'IR Total Dashboard',
          description: 'IR total dashboard',
          url: 'https://perfectjjong.github.io/IR-Dashboard/',
          icon: '📅',
        },
      ],
    };

    // Price Tracking group (accordion card)
    const PRICE_GROUP = {
      name: 'Price Tracking',
      description: 'Price tracking (5)',
      icon: '💰',
      children: [
        {
          name: 'eXtra Price Tracking',
          description: 'eXtra AC price tracker',
          url: 'https://perfectjjong.github.io/extra-ac-price-tracker/',
          icon: '🛒',
        },
        {
          name: 'Al Manea Price Tracking',
          description: 'Al Manea AC price tracker',
          url: 'https://perfectjjong.github.io/almanea-ac-price-tracker/',
          icon: '🏪',
        },
        {
          name: 'Black Box Price Tracking',
          description: 'Black Box AC price tracker',
          url: 'https://perfectjjong.github.io/blackbox-ac-price-tracker/',
          icon: '🏷️',
        },
        {
          name: 'Al Khunizan Price Tracking',
          description: 'Al Khunizan AC price tracker',
          url: 'https://perfectjjong.github.io/alkhunaizan-ac-dashboard/',
          icon: '🏬',
        },
        {
          name: 'Bin Hamoud Price Tracking',
          description: 'Bin Hamoud price tracker',
          url: 'https://perfectjjong.github.io/bh-ac-dashboard/',
          icon: '💲',
        },
      ],
    };

    // Standard dashboard cards
    const DASHBOARDS = [
      {
        name: 'Shaker MD App',
        description: 'Claude Code mobile approval system',
        url: '#',
        icon: '🤖',
      },
    ];

    // ============================================
    // No need to modify the code below
    // ============================================

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function renderDashboards() {
      const grid = document.getElementById('dashboardGrid');
      let html = '';

      // Management accordion card
      const mg = MGMT_GROUP;
      const mgSubItems = mg.children.map(c => `
        <a class="sub-item" href="${esc(c.url)}" target="_blank" rel="noopener">
          <span class="sub-item-icon">${c.icon}</span>
          <div class="sub-item-info">
            <div class="sub-item-name">${esc(c.name)}</div>
            <div class="sub-item-desc">${esc(c.description)}</div>
          </div>
          <span class="sub-item-arrow">→</span>
        </a>
      `).join('');

      // Accordion groups with IDs for hash filtering
      const GROUPS = [
        { id: 'mgmt', data: MGMT_GROUP, delay: 0 },
        { id: 'sellout', data: SELLOUT_GROUP, delay: 0.05 },
        { id: 'price', data: PRICE_GROUP, delay: 0.1 },
      ];

      const hash = window.location.hash.replace('#', '');
      const filterGroup = hash ? hash.toLowerCase() : null;

      GROUPS.forEach(({ id, data, delay }) => {
        if (filterGroup && filterGroup !== id) return;

        const subItems = data.children.map(c => `
          <a class="sub-item" href="${esc(c.url)}" target="_blank" rel="noopener">
            <span class="sub-item-icon">${c.icon}</span>
            <div class="sub-item-info">
              <div class="sub-item-name">${esc(c.name)}</div>
              <div class="sub-item-desc">${esc(c.description)}</div>
            </div>
            <span class="sub-item-arrow">→</span>
          </a>
        `).join('');

        const autoOpen = filterGroup === id ? ' open' : '';

        html += `
          <div class="accordion-card${autoOpen}" id="${id}" style="animation-delay: ${delay}s" onclick="this.classList.toggle('open')">
            <div class="card">
              <div class="card-icon">${data.icon}</div>
              <div class="card-name">
                ${esc(data.name)}
                <span class="accordion-arrow">▼</span>
              </div>
              <div class="card-desc">${esc(data.description)}</div>
              <div class="sub-list">${subItems}</div>
            </div>
          </div>
        `;
      });

      // Standard cards (hidden when filtering by group)
      if (!filterGroup) {
        html += DASHBOARDS.map((d, i) => {
          const isPlaceholder = !d.url || d.url === '#';
          const target = isPlaceholder ? '' : ' target="_blank" rel="noopener"';
          const href = isPlaceholder ? '#' : esc(d.url);
          const badge = isPlaceholder ? '<span class="card-badge">Coming Soon</span>' : '';
          const delay = `animation-delay: ${(i + 3) * 0.05}s`;

          return `
            <a class="card-link" href="${href}"${target} style="${delay}"${isPlaceholder ? ' onclick="return false;"' : ''}>
              <div class="card">
                <div class="card-icon">${d.icon}</div>
                <div class="card-name">${esc(d.name)}</div>
                <div class="card-desc">${esc(d.description)}</div>
                ${badge}
              </div>
            </a>
          `;
        }).join('');
      }

      grid.innerHTML = html;

      // Stop event propagation on sub-item click
      grid.querySelectorAll('.sub-item').forEach(el => {
        el.addEventListener('click', e => e.stopPropagation());
      });
    }

    renderDashboards();

    // Re-render when hash changes
    window.addEventListener('hashchange', () => {
      renderDashboards();
    });
  </script>
</body>
</html>
